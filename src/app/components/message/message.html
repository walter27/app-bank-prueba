<section class="app-status-section">
  <div
    class="app-status-card"
    [class.app-status-success]="type() === 'success'"
    [class.app-status-error]="type() === 'error'"
    [class.app-status-warning]="type() === 'warning'">
    <div class="app-status-content">
      @if (icon()) {
        <div class="app-status-icon" aria-hidden="true">
          @switch (type()) {
            @case ('success') {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
              </svg>
            }
            @case ('error') {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
              </svg>
            }
            @case ('warning') {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
                />
              </svg>
            }
          }
        </div>
      }
      <div class="app-status-text">
        <p class="app-subtitle">{{ message() }}</p>
      </div>
    </div>
  </div>
</section>
